definitions:
  environment:
    android_shorebird_env: &android_shorebird_env
      flutter: 3.41.2
      groups:
        - shorebird
      vars:
        FLUTTER_VERSION: 3.41.2

    android_play_env: &android_play_env
      flutter: 3.41.2
      groups:
        - shorebird
        - play_store
      vars:
        FLUTTER_VERSION: 3.41.2

  scripts:
    - &install_shorebird
      name: Install Shorebird
      script: |
        curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
        echo PATH="$HOME/.shorebird/bin:$PATH" >> "$CM_ENV"

    - &fetch_dependencies
      name: Fetch dependencies
      script: |
        flutter config --enable-swift-package-manager
        flutter pub get

    - &verify_flutter
      name: Verify Flutter project
      script: |
        dart format --output=none --set-exit-if-changed lib test integration_test
        flutter analyze
        flutter test

    - &verify_android_signing
      name: Verify Android signing identity
      script: |
        set -e

        : "${CM_KEYSTORE_PATH:?Upload the Android keystore to Codemagic with reference blurly_upload_keystore.}"
        : "${CM_KEYSTORE_PASSWORD:?Set the keystore password on the Codemagic Android signing identity.}"
        : "${CM_KEY_ALIAS:?Set the key alias on the Codemagic Android signing identity.}"
        : "${CM_KEY_PASSWORD:?Set the key password on the Codemagic Android signing identity.}"

        keytool -list \
          -keystore "$CM_KEYSTORE_PATH" \
          -storepass "$CM_KEYSTORE_PASSWORD" \
          -alias "$CM_KEY_ALIAS" \
          >/dev/null

        signing_check_file="$CM_BUILD_DIR/signing-check.p12"
        rm -f "$signing_check_file"

        if ! keytool -importkeystore \
          -srckeystore "$CM_KEYSTORE_PATH" \
          -srcstorepass "$CM_KEYSTORE_PASSWORD" \
          -srcalias "$CM_KEY_ALIAS" \
          -srckeypass "$CM_KEY_PASSWORD" \
          -destkeystore "$signing_check_file" \
          -deststoretype PKCS12 \
          -deststorepass "$CM_KEYSTORE_PASSWORD" \
          -destkeypass "$CM_KEY_PASSWORD" \
          -noprompt \
          >/dev/null; then
          echo "Could not recover the Android signing key."
          echo "In Codemagic, edit the blurly_upload_keystore signing identity and confirm:"
          echo "- Keystore password is the store password used when the .jks was created."
          echo "- Key alias is exactly: blurly"
          echo "- Key password is the alias/key password, often the same as the store password."
          exit 1
        fi

        rm -f "$signing_check_file"
        echo "Android signing identity is readable."

workflows:
  android-shorebird-build-aab:
    name: Android Shorebird Build AAB
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      <<: *android_shorebird_env
      android_signing:
        - blurly_upload_keystore
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
    scripts:
      - *install_shorebird
      - *fetch_dependencies
      - *verify_android_signing
      - *verify_flutter
      - name: Create Shorebird Android release
        script: |
          : "${SHOREBIRD_TOKEN:?Set SHOREBIRD_TOKEN in the Codemagic shorebird group.}"
          : "${CM_KEYSTORE_PATH:?Upload the Android keystore to Codemagic with reference blurly_upload_keystore.}"

          shorebird release android \
            --artifact=aab \
            --flutter-version="$FLUTTER_VERSION"
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log

  android-shorebird-publish:
    name: Android Shorebird Publish To Play
    instance_type: mac_mini_m2
    max_build_duration: 60
    inputs:
      play_track:
        description: Google Play track. Use internal first, alpha for closed testing, production after Play grants production access.
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production
    environment:
      <<: *android_play_env
      android_signing:
        - blurly_upload_keystore
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
    scripts:
      - *install_shorebird
      - *fetch_dependencies
      - *verify_android_signing
      - *verify_flutter
      - name: Create Shorebird Android release
        script: |
          : "${SHOREBIRD_TOKEN:?Set SHOREBIRD_TOKEN in the Codemagic shorebird group.}"
          : "${CM_KEYSTORE_PATH:?Upload the Android keystore to Codemagic with reference blurly_upload_keystore.}"
          : "${GCLOUD_SERVICE_ACCOUNT_CREDENTIALS:?Set GCLOUD_SERVICE_ACCOUNT_CREDENTIALS in the Codemagic play_store group.}"

          shorebird release android \
            --artifact=aab \
            --flutter-version="$FLUTTER_VERSION"
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: ${{ inputs.play_track }}
        submit_as_draft: true

  android-shorebird-patch:
    name: Android Shorebird Patch
    instance_type: mac_mini_m2
    max_build_duration: 60
    inputs:
      release_version:
        description: Shorebird release version to patch, e.g. 1.0.0+12 or latest.
        type: string
        default: latest
    environment:
      <<: *android_shorebird_env
      android_signing:
        - blurly_upload_keystore
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
    scripts:
      - *install_shorebird
      - *fetch_dependencies
      - *verify_android_signing
      - *verify_flutter
      - name: Create Shorebird Android patch
        script: |
          : "${SHOREBIRD_TOKEN:?Set SHOREBIRD_TOKEN in the Codemagic shorebird group.}"
          : "${CM_KEYSTORE_PATH:?Upload the Android keystore to Codemagic with reference blurly_upload_keystore.}"

          shorebird patch android \
            --release-version=${{ inputs.release_version }}
