name: Bug report
description: Report a crash, incorrect behavior, or platform issue.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please avoid uploading private photos.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Blurly
        2. Pick image
        3. Select mode
        4. Move slider
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Both
        - Tests only
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and OS
      placeholder: Pixel 8, Android 15
  - type: input
    id: flutter
    attributes:
      label: Flutter version
      placeholder: flutter --version
  - type: dropdown
    id: mode
    attributes:
      label: Blur mode
      options:
        - Background
        - Person
        - Bokeh
        - Not applicable
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs or attach safe screenshots/sample images.
      render: text
